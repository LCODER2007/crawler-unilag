services:
  - type: web
    name: uraas-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 -b 0.0.0.0:$PORT uraas.dashboard.app:app
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DASHBOARD_SECRET_KEY
        generateValue: true
      - key: STORAGE_PATH
        value: ./storage
      - key: RATE_LIMIT_DELAY
        value: 2.0
      - key: MAX_DEPTH
        value: 10
      - key: CONCURRENT_REQUESTS
        value: 16
