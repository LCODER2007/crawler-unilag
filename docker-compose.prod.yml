# URAAS Production Docker Compose Configuration
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: uraas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uraas_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uraas_pass}
      POSTGRES_DB: ${POSTGRES_DB:-uraas_db}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uraas_user} -d ${POSTGRES_DB:-uraas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - uraas-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: uraas-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-uraas_redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - uraas-network

  # URAAS Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uraas-app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-uraas_user}:${POSTGRES_PASSWORD:-uraas_pass}@postgres:5432/${POSTGRES_DB:-uraas_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-uraas_redis_pass}@redis:6379/0
      STORAGE_PATH: /app/storage/pdfs
      DASHBOARD_SECRET_KEY: ${DASHBOARD_SECRET_KEY:-change-this-in-production}
      FLASK_ENV: production
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/analytics/overview"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - uraas-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: uraas-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./storage:/app/storage:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - uraas-network

  # Celery Worker (for background tasks)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uraas-celery-worker
    command: celery -A uraas.tasks worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-uraas_user}:${POSTGRES_PASSWORD:-uraas_pass}@postgres:5432/${POSTGRES_DB:-uraas_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-uraas_redis_pass}@redis:6379/0
      STORAGE_PATH: /app/storage/pdfs
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - uraas-network

  # Celery Beat (for scheduled tasks)
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uraas-celery-beat
    command: celery -A uraas.tasks beat --loglevel=info
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-uraas_user}:${POSTGRES_PASSWORD:-uraas_pass}@postgres:5432/${POSTGRES_DB:-uraas_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-uraas_redis_pass}@redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - uraas-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  uraas-network:
    driver: bridge
